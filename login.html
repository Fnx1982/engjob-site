<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
    <link rel="stylesheet" href="login.css" />
    <script src="login.js"></script>
    <script src="senha-visivel.js"></script>
    <title>Eng Job - login</title>
</head>
<body>
    <main class="container">
        <form onsubmit="event.preventDefault(); logar();">
            <h1>Eng Job</h1>
            <div class="input-box">
                <input id="registro" placeholder="Seu registro" type="text" inputmode="numeric" required />
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input id="senha" placeholder="Senha" type="password" required />
                <i class="bx bxs-lock-alt"></i>
            </div>
            <div class="remember-forgot">
                <label>
                    <input type="checkbox" id="lembrar" />
                    Lembrar-me
                </label>
                <a href="usuario.html">Recuperar senha</a>
            </div>

            <button type="submit" class="login">Login</button>
            <p id="mensagemErroLogin" style="color: crimson; text-align: center; margin-top: 10px; font-size: 13px; display: none;"></p>
        </form>
    </main>
</body>
</html>
