<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
    <link rel="stylesheet" href="usuario.css">
    <title>Recuperar Senha</title>
    
</head>
<body>
    <main class="container">
        <h1>Recuperar Senha</h1>
        <div class="input-box">
            <input type="email" id="emailRecuperar" placeholder="Digite seu email" required />
            <i class="bx bxs-envelope"></i>
        </div>
        <button onclick="recuperarSenha()">Recuperar</button>
        <button onclick="window.location.href='login.html'" class="btn-voltar">Voltar</button>
        <p id="resultadoRecuperar"></p>
    </main>

    <script>
        function recuperarSenha() {
            const email = document.getElementById("emailRecuperar").value.trim();
            const resultado = document.getElementById("resultadoRecuperar");
            if (!email) {
                resultado.style.color = "red";
                resultado.textContent = "Por favor, digite um email.";
                return;
            }
            const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
            const user = usuarios.find(u => u.email === email);
            if (user) {
                resultado.style.color = "green";
                resultado.textContent = `Senha para ${email}: ${user.senha}`;
            } else {
                resultado.style.color = "red";
                resultado.textContent = "Email não encontrado.";
            }
        }
    </script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>  
</body>
</html>
