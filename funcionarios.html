<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro de Funcionários</title>
  <link rel="stylesheet" href="funcionarios.css" />
</head>
<body>
  <header>
    <h1>Financeiro de Funcionários</h1>
    <a href="home.html" class="btn-voltar">Voltar</a>
  </header>

  <main>
    <!-- Formulário de cadastro -->
    <section class="form-container">
      <h2>Cadastrar Pagamento</h2>
      <form id="form-funcionario">
        <input type="text" id="nome" placeholder="Nome do Funcionário" required />
        <input type="text" id="obra" placeholder="Obra" required />
        <select id="mes" required>
          <option value="">Selecione o mês</option>
          <option value="Janeiro">Janeiro</option>
          <option value="Fevereiro">Fevereiro</option>
          <option value="Março">Março</option>
          <option value="Abril">Abril</option>
          <option value="Maio">Maio</option>
          <option value="Junho">Junho</option>
          <option value="Julho">Julho</option>
          <option value="Agosto">Agosto</option>
          <option value="Setembro">Setembro</option>
          <option value="Outubro">Outubro</option>
          <option value="Novembro">Novembro</option>
          <option value="Dezembro">Dezembro</option>
        </select>
        <input type="number" id="valor" placeholder="Valor Pago (R$)" required />
        <input type="file" id="comprovante" accept="image/*,application/pdf" />
        <button type="submit">Adicionar</button>
      </form>
    </section>

    <!-- Filtros -->
    <section class="filter-container">
      <h2>Filtros</h2>
      <div class="filtros">
        <select id="filtroMes">
          <option value="todos">Todos os Meses</option>
          <option value="Janeiro">Janeiro</option>
          <option value="Fevereiro">Fevereiro</option>
          <option value="Março">Março</option>
          <option value="Abril">Abril</option>
          <option value="Maio">Maio</option>
          <option value="Junho">Junho</option>
          <option value="Julho">Julho</option>
          <option value="Agosto">Agosto</option>
          <option value="Setembro">Setembro</option>
          <option value="Outubro">Outubro</option>
          <option value="Novembro">Novembro</option>
          <option value="Dezembro">Dezembro</option>
        </select>

        <select id="filtroObra">
          <option value="todas">Todas as Obras</option>
        </select>

        <input type="text" id="filtroNome" placeholder="Filtrar por nome..." />
      </div>
    </section>

    <!-- Tabela -->
    <section>
      <table id="tabela">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Obra</th>
            <th>Mês</th>
            <th>Valor Pago</th>
            <th>Comprovante</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="total" id="total">Total: R$ 0,00</div>
    </section>
  </main>

  <!-- Popup do comprovante -->
  <div id="popup-comprovante" class="popup">
    <div class="popup-content">
      <span class="fechar" id="fecharPopup">&times;</span>
      <div id="popup-body"></div>
      <button id="btn-fechar-popup">Fechar e Voltar</button>
    </div>
  </div>

  <script src="funcionarios.js"></script>
</body>
</html>
