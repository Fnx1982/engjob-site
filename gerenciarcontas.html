<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
<link rel="stylesheet" href="gerenciacontas.css" />
<script src="confirm-modal.js"></script>
<script src="validacao.js"></script>
<script src="permissoes-setor.js"></script>
<script src="senha-visivel.js"></script>
<title>Gerenciar Usuários</title>

</head>
<body>
<main class="container">
    <h1>Gerenciar Usuários</h1>

    <!-- FORMULÁRIO DE CADASTRO DE USUÁRIO -->
    <form id="formUsuario">
        <label>
            Nome Completo
            <input type="text" id="nome" required />
        </label>
        <label>
            Registro
            <input type="text" id="registro" required />
        </label>
        <label>
            Email
            <input type="email" id="email" />
        </label>
        <label>
            Telefone
            <input type="tel" id="telefone" placeholder="(99) 99999-9999" />
        </label>
        <label>
            Sexo
            <select id="sexo" required>
                <option value="" disabled selected>Selecione</option>
                <option value="Masculino">Masculino</option>
                <option value="Feminino">Feminino</option>
                <option value="Outro">Outro</option>
            </select>
        </label>
        <label>
            CPF
            <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
        </label>
        <label>
            RG
            <input type="text" id="rg" placeholder="00.000.000-0" maxlength="12" />
        </label>
        <label>
            Endereço
            <input type="text" id="endereco" />
        </label>
        <label>
            Senha
            <input type="password" id="senha" required />
        </label>
        <label>
            Setor
            <select id="setor" required>
                <option value="" disabled selected>Selecione o setor</option>
            </select>
        </label>

        <button type="submit">Adicionar Usuário</button>
    </form>

    <!-- FORMULÁRIO DE CADASTRO DE SETOR -->
    <h2>Cadastrar Setor</h2>
    <form id="formSetor">
        <div class="linha-setor">
            <input type="text" id="novoSetorInput" placeholder="Digite o nome do setor" required />
            <button type="submit">Adicionar Setor</button>
        </div>
    </form>

    <!-- LISTA DE SETORES -->
    <h2>Setores Cadastrados</h2>
    <table id="tabelaSetores">
        <thead>
            <tr>
                <th>Nome do Setor</th>
                <th>Permissões</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Modal: Definir permissões do setor -->
    <div class="modal-overlay-permissao" id="modalPermissaoSetor">
        <div class="modal-caixa-permissao">
            <div class="modal-cabecalho-permissao">
                <h2 id="tituloModalPermissao">Permissões do setor</h2>
                <button type="button" class="modal-fechar-permissao" id="fecharModalPermissao">&times;</button>
            </div>
            <p class="texto-ajuda-permissao">Marque o que esse setor pode ver no menu. "Sair" e o login sempre ficam disponíveis para todos.</p>
            <div class="lista-checkbox-permissao" id="listaCheckboxPermissao"></div>
            <div class="modal-rodape-permissao">
                <button type="button" class="btn-secundario-permissao" id="btnMarcarTudoPermissao">Marcar tudo</button>
                <button type="button" class="btn-secundario-permissao" id="btnDesmarcarTudoPermissao">Desmarcar tudo</button>
                <button type="button" class="btn-salvar-permissao" id="btnSalvarPermissaoSetor">Salvar Permissões</button>
            </div>
        </div>
    </div>

    <!-- TABELA USUÁRIOS -->
    <h2>Usuários Cadastrados</h2>
    <table id="tabelaUsuarios">
        <thead>
            <tr>
                <th>Nome Completo</th>
                <th>Registro</th>
                <th>Setor</th>
                <th>Editar</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="window.location.href='home.html'">Voltar</button>
</main>

<script>
    // Funções de Setores (mantidas iguais)
    let setorEmEdicaoPermissao = null;

    function rotuloResumoPermissoes(nomeSetor) {
        const permissoes = getPermissoesDoSetor(nomeSetor);
        if (permissoes.length === 0) return "Nenhuma permissão definida";
        if (permissoes.length === ITENS_MENU_DISPONIVEIS.length) return "Acesso total";
        return `${permissoes.length} de ${ITENS_MENU_DISPONIVEIS.length} itens`;
    }

    function carregarSetores() {
        const setores = JSON.parse(localStorage.getItem("setores")) || [];
        const selectSetor = document.getElementById("setor");
        selectSetor.innerHTML = '<option value="" disabled selected>Selecione o setor</option>';
        setores.forEach(setor => {
            const option = document.createElement("option");
            option.value = setor;
            option.textContent = setor;
            selectSetor.appendChild(option);
        });

        const tbody = document.querySelector("#tabelaSetores tbody");
        tbody.innerHTML = "";
        setores.forEach((setor, index) => {
            const tr = document.createElement("tr");
            const tdNome = document.createElement("td");
            tdNome.textContent = setor;
            tr.appendChild(tdNome);

            const tdPermissoes = document.createElement("td");
            const btnPermissoes = document.createElement("button");
            btnPermissoes.textContent = rotuloResumoPermissoes(setor);
            btnPermissoes.className = "btn-permissoes-setor";
            btnPermissoes.title = "Clique para configurar o que este setor pode ver";
            btnPermissoes.addEventListener("click", () => abrirModalPermissao(setor));
            tdPermissoes.appendChild(btnPermissoes);
            tr.appendChild(tdPermissoes);

            const tdAcoes = document.createElement("td");
            const btnExcluir = document.createElement("button");
            btnExcluir.textContent = "Excluir";
            btnExcluir.className = "btn-excluir-setor";
            btnExcluir.addEventListener("click", () => excluirSetor(index));
            tdAcoes.appendChild(btnExcluir);
            tr.appendChild(tdAcoes);

            tbody.appendChild(tr);
        });
    }

    // ===== Modal de permissões do setor =====
    function abrirModalPermissao(nomeSetor) {
        setorEmEdicaoPermissao = nomeSetor;
        document.getElementById("tituloModalPermissao").textContent = `Permissões — ${nomeSetor}`;

        const permissoesAtuais = getPermissoesDoSetor(nomeSetor);
        const lista = document.getElementById("listaCheckboxPermissao");
        lista.innerHTML = "";

        ITENS_MENU_DISPONIVEIS.forEach((item) => {
            const linha = document.createElement("label");
            linha.className = "linha-checkbox-permissao";
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = item.id;
            checkbox.checked = permissoesAtuais.includes(item.id);
            linha.appendChild(checkbox);
            linha.appendChild(document.createTextNode(item.rotulo));
            lista.appendChild(linha);
        });

        document.getElementById("modalPermissaoSetor").classList.add("active");
    }

    function fecharModalPermissaoFn() {
        document.getElementById("modalPermissaoSetor").classList.remove("active");
        setorEmEdicaoPermissao = null;
    }

    document.getElementById("fecharModalPermissao").addEventListener("click", fecharModalPermissaoFn);
    document.getElementById("modalPermissaoSetor").addEventListener("click", (e) => {
        if (e.target.id === "modalPermissaoSetor") fecharModalPermissaoFn();
    });

    document.getElementById("btnMarcarTudoPermissao").addEventListener("click", () => {
        document.querySelectorAll("#listaCheckboxPermissao input[type=checkbox]").forEach((cb) => cb.checked = true);
    });
    document.getElementById("btnDesmarcarTudoPermissao").addEventListener("click", () => {
        document.querySelectorAll("#listaCheckboxPermissao input[type=checkbox]").forEach((cb) => cb.checked = false);
    });

    document.getElementById("btnSalvarPermissaoSetor").addEventListener("click", () => {
        if (!setorEmEdicaoPermissao) return;
        const marcados = [...document.querySelectorAll("#listaCheckboxPermissao input[type=checkbox]:checked")].map((cb) => cb.value);
        salvarPermissoesDoSetor(setorEmEdicaoPermissao, marcados);
        mostrarToast(`Permissões de "${setorEmEdicaoPermissao}" atualizadas.`);
        fecharModalPermissaoFn();
        carregarSetores();
    });

    function salvarNovoSetor(novoSetor) {
        let setores = JSON.parse(localStorage.getItem("setores")) || [];
        if (setores.includes(novoSetor)) {
            marcarCampoComErro(document.getElementById("novoSetorInput"), "Este setor já existe.");
            return false;
        }
        setores.push(novoSetor);
        localStorage.setItem("setores", JSON.stringify(setores));
        // Novo setor começa sem nenhuma permissão marcada — o usuário
        // deve configurar manualmente pelo botão de permissões.
        salvarPermissoesDoSetor(novoSetor, []);
        carregarSetores();
        return true;
    }

    function excluirSetor(index) {
        let setores = JSON.parse(localStorage.getItem("setores")) || [];
        const nomeSetor = setores[index];
        setores.splice(index, 1);
        localStorage.setItem("setores", JSON.stringify(setores));
        excluirSetorDasPermissoes(nomeSetor);
        carregarSetores();
    }

    document.getElementById("formSetor").addEventListener("submit", function(e) {
        e.preventDefault();
        limparErroCampo(document.getElementById("novoSetorInput"));
        const novoSetor = document.getElementById("novoSetorInput").value.trim();
        if (novoSetor) {
            if (salvarNovoSetor(novoSetor)) {
                document.getElementById("novoSetorInput").value = "";
            }
        }
    });
    limparErroAoEditar(document.getElementById("novoSetorInput"));

    // Máscaras (mantidas iguais)
    function mascaraTelefone(event) {
        let input = event.target;
        let valor = input.value.replace(/\D/g, '');
        if (valor.length > 11) valor = valor.slice(0, 11);

        if (valor.length > 10) {
            valor = valor.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
        } else if (valor.length > 5) {
            valor = valor.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
        } else if (valor.length > 2) {
            valor = valor.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
        } else if (valor.length > 0) {
            valor = valor.replace(/^(\d{0,2})/, '($1');
        }
        input.value = valor;
    }
    document.getElementById("telefone").addEventListener("input", mascaraTelefone);

    function mascaraCPF(event) {
        let input = event.target;
        let valor = input.value.replace(/\D/g, '');
        if (valor.length > 11) valor = valor.slice(0, 11);
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        input.value = valor;
    }
    document.getElementById("cpf").addEventListener("input", mascaraCPF);

    function mascaraRG(event) {
        let input = event.target;
        let valor = input.value.replace(/\D/g, '');
        if (valor.length > 9) valor = valor.slice(0, 9);
        valor = valor.replace(/(\d{2})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1})$/, '$1-$2');
        input.value = valor;
    }
    document.getElementById("rg").addEventListener("input", mascaraRG);

    // Usuários

    function carregarUsuarios() {
        const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
        const tbody = document.querySelector("#tabelaUsuarios tbody");
        tbody.innerHTML = "";

        usuarios.forEach((user, index) => {
            const tr = document.createElement("tr");

            const tdNome = document.createElement("td");
            tdNome.textContent = user.nome;
            tr.appendChild(tdNome);

            const tdRegistro = document.createElement("td");
            tdRegistro.textContent = user.registro;
            tr.appendChild(tdRegistro);

            const tdSetor = document.createElement("td");
            tdSetor.textContent = user.setor || "—";
            tr.appendChild(tdSetor);

            const tdEditar = document.createElement("td");
            const btnEditar = document.createElement("button");
            btnEditar.textContent = "Editar";
            btnEditar.className = "btn-editar";
            btnEditar.addEventListener("click", () => {
                window.location.href = `editar.html?index=${index}`;
            });
            tdEditar.appendChild(btnEditar);
            tr.appendChild(tdEditar);

            tbody.appendChild(tr);
        });
    }

    document.getElementById("formUsuario").addEventListener("submit", function(event) {
        event.preventDefault();

        const campoNome = document.getElementById("nome");
        const campoRegistro = document.getElementById("registro");
        const campoSexo = document.getElementById("sexo");
        const campoSenha = document.getElementById("senha");
        const campoSetor = document.getElementById("setor");
        const campoTelefone = document.getElementById("telefone");

        limparErrosDoFormulario(this);

        const nome = campoNome.value.trim();
        const registro = campoRegistro.value.trim();
        const email = document.getElementById("email").value.trim();
        const telefone = campoTelefone.value.trim();
        const sexo = campoSexo.value;
        const cpf = document.getElementById("cpf").value.trim();
        const rg = document.getElementById("rg").value.trim();
        const endereco = document.getElementById("endereco").value.trim();
        const senha = campoSenha.value;
        const setor = campoSetor.value;

        // LOG DE DEPURAÇÃO: abra o Console (F12) para ver os valores capturados
        console.log("Dados do formulário:", { nome, registro, email, telefone, sexo, cpf, rg, endereco, senha, setor });

        // Campos obrigatórios: Nome, Registro, Sexo, Senha e Setor.
        // Email, Telefone, CPF e Endereço agora são opcionais.
        let temErro = false;
        if (!nome) { marcarCampoComErro(campoNome, "Informe o nome completo."); temErro = true; }
        if (!registro) { marcarCampoComErro(campoRegistro, "Informe o registro."); temErro = true; }
        if (!sexo) { marcarCampoComErro(campoSexo, "Selecione o sexo."); temErro = true; }
        if (!senha) { marcarCampoComErro(campoSenha, "Informe uma senha."); temErro = true; }
        if (!setor) { marcarCampoComErro(campoSetor, "Selecione o setor."); temErro = true; }

        // Telefone é opcional, mas se for preenchido, precisa ter um formato válido.
        const telefoneRegex = /^\(\d{2}\)\s?\d{4,5}-\d{4}$/;
        if (telefone && !telefoneRegex.test(telefone)) {
            marcarCampoComErro(campoTelefone, "Telefone inválido. Use (99) 99999-9999, ou deixe em branco.");
            console.warn("Telefone rejeitado pela regex:", telefone);
            temErro = true;
        }

        if (temErro) {
            focarPrimeiroErro(this);
            return;
        }

        let usuarios = [];
        try {
            usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
        } catch (err) {
            console.error("Erro ao ler usuarios do localStorage:", err);
            usuarios = [];
        }

        if (usuarios.some(u => u.registro === registro)) {
            marcarCampoComErro(campoRegistro, "Já existe um usuário com este registro.");
            focarPrimeiroErro(this);
            return;
        }
        if (email && usuarios.some(u => u.email === email)) {
            marcarCampoComErro(document.getElementById("email"), "Já existe um usuário com este email.");
            focarPrimeiroErro(this);
            return;
        }

        const novoUsuario = {
            nome,
            registro,
            email,
            telefone,
            sexo,
            cpf,
            rg,
            endereco,
            senha,
            setor,
        };

        usuarios.push(novoUsuario);

        // CORREÇÃO: try/catch para detectar falhas de gravação
        // (ex: localStorage desabilitado, modo privado, quota excedida)
        try {
            localStorage.setItem("usuarios", JSON.stringify(usuarios));
            console.log("Usuário salvo com sucesso. Total de usuários:", usuarios.length);
        } catch (err) {
            console.error("Erro ao salvar usuario no localStorage:", err);
            mostrarToast("Não foi possível salvar. Verifique se o armazenamento local está habilitado.", "erro");
            return;
        }

        this.reset();
        carregarUsuarios();
        mostrarToast("Usuário cadastrado com sucesso!");
    });


    window.addEventListener("load", () => {
        carregarSetores();
        carregarUsuarios();

        // Trata avisos vindos de outras páginas (ex: editar.html
        // redirecionando quando o usuário não é encontrado).
        const paramsUrl = new URLSearchParams(window.location.search);
        const erro = paramsUrl.get("erro");
        if (erro === "usuario_nao_especificado") {
            mostrarToast("Usuário não especificado.", "erro");
            window.history.replaceState({}, "", "gerenciarcontas.html");
        } else if (erro === "usuario_nao_encontrado") {
            mostrarToast("Usuário não encontrado.", "erro");
            window.history.replaceState({}, "", "gerenciarcontas.html");
        }
    });
</script>
</body>
</html>
