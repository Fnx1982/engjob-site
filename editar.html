<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet' />
    <link rel="stylesheet" href="editar.css">
    <script src="confirm-modal.js"></script>
    <script src="validacao.js"></script>
    <script src="senha-visivel.js"></script>
    <title>Editar Usuário</title>
    
</head>
<body>
    <main class="container">
        <h1>Editar Usuário</h1>
        <form id="formEditarUsuario">
            <label>
                Nome Completo
                <input type="text" id="nome" required />
            </label>
            <label>
                Registro
                <input type="text" id="registro" required />
            </label>
            <label>
                Email <span style="font-weight:normal;color:#888;font-size:12px;">(opcional)</span>
                <input type="email" id="email" />
            </label>
            <label>
                Telefone <span style="font-weight:normal;color:#888;font-size:12px;">(opcional)</span>
                <input type="tel" id="telefone" placeholder="(99) 99999-9999" />
            </label>
            <label>
                Sexo
                <select id="sexo" required>
                    <option value="" disabled>Selecione</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Outro">Outro</option>
                </select>
            </label>
            <label>
                CPF <span style="font-weight:normal;color:#888;font-size:12px;">(opcional)</span>
                <input type="text" id="cpf" />
            </label>
            <label>
                RG <span style="font-weight:normal;color:#888;font-size:12px;">(opcional)</span>
                <input type="text" id="rg" />
            </label>
            <label>
                Endereço <span style="font-weight:normal;color:#888;font-size:12px;">(opcional)</span>
                <input type="text" id="endereco" />
            </label>
            <label>
                Senha
                <input type="password" id="senha" required />
            </label>
            <label>
                Setor
                <select id="setor" required>
                    <option value="" disabled>Selecione o setor</option>
                </select>
            </label>

            <button type="submit" class="btn-salvar">Salvar Alterações</button>
        </form>
        <button id="btnExcluir" class="btn-excluir">Excluir Usuário</button>
        <button class="btn-voltar" onclick="window.location.href='gerenciarcontas.html'">Voltar</button>
    </main>

    <script>
        // Função para aplicar máscara no telefone (mesma lógica da página principal)
        function mascaraTelefone(event) {
            let input = event.target;
            let valor = input.value.replace(/\D/g, '');

            if (valor.length > 11) {
                valor = valor.slice(0, 11);
            }

            if (valor.length > 10) {
                valor = valor.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
            } else if (valor.length > 5) {
                valor = valor.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
            } else if (valor.length > 2) {
                valor = valor.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
            } else if (valor.length > 0) {
                valor = valor.replace(/^(\d{0,2})/, '($1');
            }

            input.value = valor;
        }

        document.getElementById("telefone").addEventListener("input", mascaraTelefone);

        // Função para obter parâmetro da URL
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const index = getQueryParam("index");
        if (index === null) {
            // Sem popup bloqueante: avisa via toast e redireciona direto.
            window.location.href = "gerenciarcontas.html?erro=usuario_nao_especificado";
        }

        // Carregar dados do usuário para edição
        const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
        const usuario = usuarios[index];

        if (!usuario) {
            window.location.href = "gerenciarcontas.html?erro=usuario_nao_encontrado";
        }

        // Popula o select de Setor com os setores cadastrados
        // dinamicamente (mesma lista usada em gerenciarcontas.html),
        // em vez de uma lista fixa desatualizada.
        const setoresDisponiveis = JSON.parse(localStorage.getItem("setores")) || [];
        const selectSetorEditar = document.getElementById("setor");
        setoresDisponiveis.forEach((s) => {
            const opt = document.createElement("option");
            opt.value = s;
            opt.textContent = s;
            selectSetorEditar.appendChild(opt);
        });
        // Garante que o setor atual do usuário apareça, mesmo que
        // não esteja (mais) na lista cadastrada de setores.
        if (usuario && usuario.setor && !setoresDisponiveis.includes(usuario.setor)) {
            const opt = document.createElement("option");
            opt.value = usuario.setor;
            opt.textContent = usuario.setor + " (não está mais na lista)";
            selectSetorEditar.appendChild(opt);
        }

        // Preencher formulário com dados do usuário
        document.getElementById("nome").value = usuario.nome;
        document.getElementById("registro").value = usuario.registro;
        document.getElementById("email").value = usuario.email || "";
        document.getElementById("telefone").value = usuario.telefone || "";
        document.getElementById("sexo").value = usuario.sexo;
        document.getElementById("cpf").value = usuario.cpf || "";
        document.getElementById("rg").value = usuario.rg || "";
        document.getElementById("endereco").value = usuario.endereco || "";
        document.getElementById("senha").value = usuario.senha;
        document.getElementById("setor").value = usuario.setor;

        // Salvar alterações
        document.getElementById("formEditarUsuario").addEventListener("submit", function(event) {
            event.preventDefault();

            const campoNome = document.getElementById("nome");
            const campoRegistro = document.getElementById("registro");
            const campoSexo = document.getElementById("sexo");
            const campoSenha = document.getElementById("senha");
            const campoSetor = document.getElementById("setor");
            const campoTelefone = document.getElementById("telefone");
            const campoEmail = document.getElementById("email");

            limparErrosDoFormulario(this);

            const nome = campoNome.value.trim();
            const registro = campoRegistro.value.trim();
            const email = campoEmail.value.trim();
            const telefone = campoTelefone.value.trim();
            const sexo = campoSexo.value;
            const cpf = document.getElementById("cpf").value.trim();
            const rg = document.getElementById("rg").value.trim();
            const endereco = document.getElementById("endereco").value.trim();
            const senha = campoSenha.value;
            const setor = campoSetor.value;

            let temErro = false;
            if (!nome) { marcarCampoComErro(campoNome, "Informe o nome completo."); temErro = true; }
            if (!registro) { marcarCampoComErro(campoRegistro, "Informe o registro."); temErro = true; }
            if (!sexo) { marcarCampoComErro(campoSexo, "Selecione o sexo."); temErro = true; }
            if (!senha) { marcarCampoComErro(campoSenha, "Informe uma senha."); temErro = true; }
            if (!setor) { marcarCampoComErro(campoSetor, "Selecione o setor."); temErro = true; }

            // Telefone é opcional, mas se preenchido precisa de formato válido.
            const telefoneRegex = /^\(\d{2}\)\s?\d{4,5}-\d{4}$/;
            if (telefone && !telefoneRegex.test(telefone)) {
                marcarCampoComErro(campoTelefone, "Telefone inválido. Use (99) 99999-9999, ou deixe em branco.");
                temErro = true;
            }

            if (temErro) {
                focarPrimeiroErro(this);
                return;
            }

            const registroExistente = usuarios.some((u, i) => u.registro === registro && i != index);
            if (registroExistente) {
                marcarCampoComErro(campoRegistro, "Registro já cadastrado em outro usuário.");
                focarPrimeiroErro(this);
                return;
            }
            const emailExistente = email && usuarios.some((u, i) => u.email === email && i != index);
            if (emailExistente) {
                marcarCampoComErro(campoEmail, "Email já cadastrado em outro usuário.");
                focarPrimeiroErro(this);
                return;
            }

            usuarios[index] = { nome, registro, email, telefone, sexo, cpf, rg, endereco, setor, senha };

            localStorage.setItem("usuarios", JSON.stringify(usuarios));
            window.location.href = "home.html";
        });


        // Excluir usuário
        document.getElementById("btnExcluir").addEventListener("click", async function() {
            const confirmado = await confirmarAcao(
                `Excluir o usuário "${usuario.nome}"?`,
                "Essa ação não pode ser desfeita."
            );
            if (!confirmado) return;

            usuarios.splice(index, 1);
            localStorage.setItem("usuarios", JSON.stringify(usuarios));
            window.location.href = "gerenciarcontas.html";
        });
    </script>
</body>
</html>
