<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento</title>
  <link rel="stylesheet" href="propostas.css" />
  <script src="confirm-modal.js"></script>
  <script src="validacao.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="propostas-core.js"></script>
</head>
<body>
  <main class="container">
    <div class="topo-pagina">
      <div>
        <h1>Orçamento</h1>
        <p>Monte o orçamento e envie para análise quando estiver pronto.</p>
      </div>
      <a href="home.html" class="btn-voltar">Voltar</a>
    </div>

    <div class="barra-acoes">
      <div></div>
      <button type="button" class="btn-laranja" id="btnNovoOrcamento">+ Novo Orçamento</button>
    </div>

    <div class="card-filtros">
      <h2>Filtros</h2>
      <div class="filtros">
        <div class="filtro-busca">
          <label class="filtro-label" for="buscaTexto">Buscar</label>
          <input type="text" id="buscaTexto" placeholder="Cliente, local ou serviço..." />
        </div>
        <div class="select-simples">
          <label class="filtro-label" for="filtroMes">Mês</label>
          <select id="filtroMes"><option value="todos">Todos</option></select>
        </div>
        <div class="select-simples">
          <label class="filtro-label" for="filtroAno">Ano</label>
          <select id="filtroAno"><option value="todos">Todos</option></select>
        </div>
        <button type="button" class="btn-limpar-filtros" id="btnLimparFiltros">Limpar filtros</button>
      </div>
    </div>

    <div class="lista-propostas" id="listaPropostas"></div>
    <div class="sem-resultados" id="semResultados" style="display:none;">
      Nenhum orçamento criado ainda. Clique em "+ Novo Orçamento" para começar.
    </div>
  </main>

  <script src="propostas-form.js"></script>
  <script src="orcamento.js"></script>
</body>
</html>
