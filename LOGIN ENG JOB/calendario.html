<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Calendar</title>
  <link rel="stylesheet" href="calendario.css">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <!-- Autenticação Google compartilhada com home.html (carrega primeiro) -->
  <script src="google-auth.js"></script>

  <!-- Google API -->
  <script async defer src="https://apis.google.com/js/api.js"
          onload="initGoogleAPI()">
  </script>

  <!-- Nova biblioteca de identidade -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="dashboard">
    <div class="card-calendario">
      <h2>
        Meus Eventos
        <a href="home.html" class="btn-voltar">Voltar</a>
      </h2>

      <!-- Botão de login -->
      <button id="btnLogin" style="display:none;">Conectar com Google</button>
      <button id="btnLogout" style="display:none;">Logout</button>

      <!-- Calendário -->
      <div id="calendar"></div>
    </div>
  </div>

  <!-- Modal para criar/editar evento -->
  <div id="eventModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="fecharModal()">&times;</span>
      <h3>Novo Evento</h3>
      <input type="text" id="eventTitle" placeholder="Título do evento">
      <input type="datetime-local" id="eventStart">
      <input type="datetime-local" id="eventEnd">
      <button id="btnSalvar" onclick="salvarEvento()">Salvar</button>
      <button id="btnEditar" onclick="editarEvento()" style="display:none;">Editar</button>
      <button id="btnExcluir" onclick="excluirEvento()" style="display:none;">Excluir</button>
    </div>
  </div>


  <script src="calendario.js"></script>
  <script>
    // O calendario.js está no final do <body>, então os elementos
    // (#btnLogin, #calendar, etc.) já existem nesse ponto — não
    // precisamos esperar DOMContentLoaded, que poderia disparar
    // depois do script "async" do Google já ter chamado o callback.
    onGoogleAuthChange(iniciarTelaCalendario);
  </script>
</body>
</html>
