<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão de Materiais</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="gestao.css">
</head>
<body>

    <div class="top-bar">
        <a href="home.html" class="btn btn-home">⬅ Voltar</a>
    </div>

    <div class="container">
        
        <div class="section" id="secCadastroMateriais">
            <h2>Cadastro de Materiais</h2>
            <div class="form-group"><label>Nome:</label><input type="text" id="nomeMaterial"></div>
            <div class="form-group"><label>Valor (R$):</label><input type="number" id="valorMaterial" step="0.01"></div>
            <div class="form-group">
                <label>Setores:</label>
                <select id="setorMaterial"><option value="">Selecione um setor...</option></select>
            </div>
            <div class="form-group"><label>Código:</label><input type="number" id="codigoMaterial"></div>
            <div class="form-group"><label>Quantidade:</label><input type="number" id="quantidadeMaterial"></div>
            <div class="form-group"><label>Observação:</label><textarea id="obsMaterial" rows="3"></textarea></div>
            <button class="btn btn-add" onclick="adicionarMaterial()">Adicionar Material</button>
        </div>

        <div class="section" id="secGerenciarTipos">
            <h2>Gerenciamento de Setores</h2>
            <div class="form-group"><label>Novo Setor:</label><input type="text" id="novoTipo"></div>
            <button class="btn btn-add" onclick="adicionarTipo()">Adicionar Setor</button>
            <table id="tabelaTipos">
                <thead><tr><th>#</th><th>Nome</th><th>Ações</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section">
            <h2>Lista de Materiais</h2>
            <input type="text" id="pesquisa" placeholder="Pesquisar..." oninput="renderMateriais()">
            <table id="tabelaMateriais">
                <thead>
                    <tr><th>#</th><th>Nome</th><th>Valor</th><th>Setor</th><th>Código</th><th>Qtd</th><th>Obs</th><th>Ações</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="modalEditarMaterial" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalEditarMaterial')">&times;</span>
            <h3>Editar Material</h3>
            <input type="hidden" id="editIndex">
            <div class="form-group"><label>Nome:</label><input type="text" id="editNome"></div>
            <div class="form-group"><label>Valor:</label><input type="number" id="editValor" step="0.01"></div>
            <div class="form-group"><label>Setor:</label><select id="editSetor"></select></div>
            <div class="form-group"><label>Código:</label><input type="number" id="editCodigo"></div>
            <div class="form-group"><label>Quantidade:</label><input type="number" id="editQuantidade"></div>
            <div class="form-group"><label>Observação:</label><textarea id="editObs"></textarea></div>
            <button class="btn btn-export" style="width:100%" onclick="salvarEdicaoMaterial()">Salvar Alterações</button>
        </div>
    </div>

    <div id="modalEditarTipo" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal('modalEditarTipo')">&times;</span>
            <h3>Editar Setor</h3>
            <input type="hidden" id="editTipoIndex">
            <div class="form-group"><label>Nome do Setor:</label><input type="text" id="editTipoNome"></div>
            <button class="btn btn-export" style="width:100%" onclick="salvarEdicaoTipo()">Salvar Alterações</button>
        </div>
    </div>

    <div id="modalConfirmacao" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h3 style="color: #d9534f; border-bottom-color: #d9534f;">Confirmar Exclusão</h3>
            <p id="confirMensagem">Deseja realmente excluir este item?</p>
            <div style="margin-top: 20px;">
                <button id="btnConfirmarSim" class="btn btn-delete">Sim, Excluir</button>
                <button class="btn btn-add" onclick="fecharModal('modalConfirmacao')">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="gestaodematerial.js"></script>
</body>
</html>
