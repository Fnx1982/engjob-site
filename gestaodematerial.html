<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Materiais</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="gestaodematerial.css">
    <script src="confirm-modal.js"></script>
    <script src="validacao.js"></script>
</head>
<body>
  <main class="container">
    <div class="topo-pagina">
      <h1>Gestão de Materiais</h1>
      <a href="home.html" class="btn-voltar">Voltar</a>
    </div>

    <!-- Barra de ações -->
    <div class="barra-acoes">
      <div class="abas">
        <button type="button" class="aba active" id="btnVisaoSetor">Por Setor</button>
        <button type="button" class="aba" id="btnVisaoMaterial">Por Material</button>
      </div>

      <div class="botoes-cadastro">
        <button type="button" class="btn-secundario" id="btnAbrirSetor">+ Setor</button>
        <button type="button" class="btn-laranja" id="btnAbrirMaterial">+ Material</button>
      </div>
    </div>

    <!-- Filtros -->
    <div class="card-filtros">
      <h2>Filtros</h2>
      <div class="filtros">
        <div class="filtro-busca">
          <label class="filtro-label" for="buscaTexto">Buscar</label>
          <input type="text" id="buscaTexto" placeholder="Nome, código ou observação..." />
        </div>

        <div class="multi-select" id="multiFiltroSetor">
          <button type="button" class="multi-select-toggle" id="toggleFiltroSetor">
            <span class="filtro-label">Setor</span>
            <span class="filtro-valor" id="resumoFiltroSetor">Todos</span>
          </button>
          <div class="multi-select-painel" id="painelFiltroSetor"></div>
        </div>

        <button type="button" class="btn-limpar-filtros" id="btnLimparFiltros">Limpar filtros</button>
      </div>
    </div>

    <!-- Conteúdo agrupado (setor ou material) -->
    <div id="grupos"></div>
    <div class="sem-resultados" id="semResultados" style="display:none;">
      Nenhum material encontrado com esses filtros.
    </div>
  </main>

  <!-- Total fixo no rodapé -->
  <div class="total-fixo">
    <div class="bloco-total">
      <span>Itens exibidos</span>
      <span id="totalItensValor">0</span>
    </div>
    <div class="bloco-total">
      <span>Quantidade total</span>
      <span id="totalQuantidadeValor">0</span>
    </div>
    <div class="bloco-total">
      <span>Valor total</span>
      <span id="totalValorValor">R$ 0,00</span>
    </div>
  </div>

  <!-- Modal: Cadastrar / gerenciar Setores -->
  <div class="modal-overlay" id="modalSetor">
    <div class="modal-caixa">
      <div class="modal-cabecalho">
        <h2>Setores</h2>
        <button type="button" class="modal-fechar" id="fecharModalSetor">&times;</button>
      </div>
      <form id="form-setor" class="linha-form">
        <input type="text" id="novoSetorInput" placeholder="Nome do setor" required />
        <button type="submit" class="btn-laranja">Adicionar</button>
      </form>
      <div id="listaSetores" class="chips-lista"></div>
    </div>
  </div>

  <!-- Modal: Cadastrar / Editar Material -->
  <div class="modal-overlay" id="modalMaterial">
    <div class="modal-caixa">
      <div class="modal-cabecalho">
        <h2 id="tituloModalMaterial">Novo Material</h2>
        <button type="button" class="modal-fechar" id="fecharModalMaterial">&times;</button>
      </div>
      <form id="form-material" class="form-modal-grid">
        <label class="campo-largura-total">
          Nome do material
          <input type="text" id="nomeMaterial" placeholder="Ex: Cimento CP II 50kg" required />
        </label>

        <label>
          Setor
          <select id="setorMaterial" required>
            <option value="" disabled selected>Selecione o setor</option>
          </select>
        </label>

        <label>
          Código
          <input type="text" id="codigoMaterial" placeholder="Ex: 0012" required />
        </label>

        <label>
          Valor unitário (R$)
          <input type="number" id="valorMaterial" placeholder="0,00" step="0.01" min="0" required />
        </label>

        <label>
          <span class="rotulo-com-opcional">Quantidade <span class="texto-opcional">(opcional)</span></span>
          <input type="number" id="quantidadeMaterial" placeholder="0" min="0" />
        </label>

        <label class="campo-largura-total">
          Observação
          <textarea id="obsMaterial" rows="2" placeholder="Opcional"></textarea>
        </label>

        <button type="submit" id="btnSubmitMaterial" class="btn-laranja campo-largura-total">Adicionar</button>
      </form>
    </div>
  </div>

  <script src="gestaodematerial.js"></script>
</body>
</html>
